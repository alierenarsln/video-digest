<!doctype html>
<html lang="tr" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tanık</title>
<link rel="stylesheet" href="/static/ds/styles.css">
<style>
/* ── Tanık kabuğu ────────────────────────────────────────────────
   Tasarım sistemi token'ları ds/ altında birebir duruyor. Buradaki
   kurallar yalnızca bu uygulamanın düzeni; renk/tipografi/boşluk
   değerleri token'lardan gelir, elle sayı yazılmaz. */

/* başlık */
.ust {
  position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; gap: var(--space-4);
  padding: var(--space-3) var(--space-5);
  background: var(--surface-app);
  border-bottom: 1px solid var(--border-hair);
}
.marka {
  font-family: var(--font-serif); font-size: 21px; font-weight: var(--fw-semibold);
  color: var(--text-strong); letter-spacing: var(--track-tight);
  background: none; border: 0; padding: 0; cursor: pointer;
  transition: color var(--dur-1) var(--ease-standard);
}
.marka:hover { color: var(--accent-strong); }
.marka b { color: var(--accent); font-weight: inherit; }
.ust .sag { margin-left: auto; display: flex; align-items: center; gap: var(--space-4); }
.saglik { display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: var(--fs-micro); color: var(--text-muted); }
.nokta { width: 7px; height: 7px; border-radius: 999px; flex: none; }

/* düzen */
.govde { display: grid; grid-template-columns: 268px minmax(0, 1fr); min-height: calc(100vh - 53px); }
.yan { border-right: 1px solid var(--border-hair); padding: var(--space-4); }
.ana { padding: var(--space-6) var(--space-6) 96px; }
.kolon { max-width: 820px; margin: 0 auto; animation: tnk-fade-up var(--dur-3) var(--ease-standard); }
@media (max-width: 900px) { .govde { grid-template-columns: 1fr; } .yan { border-right: 0; border-bottom: 1px solid var(--border-hair); } }

/* kart */
.kart {
  background: var(--surface-card); border: 1px solid var(--border-hair);
  border-radius: var(--radius-2); padding: var(--space-5);
}
.kart.vurgu { border-left: 3px solid var(--accent); }

/* giriş */
.sekmeler { display: flex; gap: 4px; margin-bottom: var(--space-4); }
.sekme {
  font: inherit; font-size: var(--fs-sm); font-weight: var(--fw-medium);
  padding: 6px 12px; cursor: pointer; color: var(--text-muted);
  background: transparent; border: 1px solid transparent; border-radius: var(--radius-1);
  transition: color var(--dur-1) var(--ease-standard), background var(--dur-1) var(--ease-standard);
}
.sekme[aria-selected="true"] { background: var(--surface-sunken); color: var(--text-strong); border-color: var(--border-hair); }
.satir { display: flex; gap: var(--space-3); }
input[type=text], select {
  font: inherit; font-size: var(--fs-body); color: var(--text-body);
  background: var(--surface-card); border: 1px solid var(--border-strong);
  border-radius: var(--radius-1); padding: 9px 11px; width: 100%;
  transition: border-color var(--dur-1) var(--ease-standard);
}
input[type=text]:focus-visible, select:focus-visible { border-color: var(--accent); }
input[type=text]::placeholder { color: var(--text-faint); }
.dosyaAlan {
  border: 1px dashed var(--border-strong); border-radius: var(--radius-2);
  padding: var(--space-5); text-align: center; cursor: pointer;
  color: var(--text-muted); font-size: var(--fs-sm);
  transition: border-color var(--dur-1) var(--ease-standard), background var(--dur-1) var(--ease-standard);
}
.dosyaAlan:hover { border-color: var(--accent); background: var(--surface-sunken); }
.dosyaAlan.dolu { border-style: solid; border-color: var(--sig-verified); color: var(--text-strong); }

/* buton */
.btn {
  font: inherit; font-size: var(--fs-sm); font-weight: var(--fw-medium);
  padding: 9px 16px; border-radius: var(--radius-1); cursor: pointer;
  border: 1px solid var(--accent); background: var(--accent); color: var(--text-on-accent);
  white-space: nowrap;
  transition: background var(--dur-1) var(--ease-standard);
}
.btn:hover:not(:disabled) { background: var(--accent-strong); border-color: var(--accent-strong); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn.sessiz { background: transparent; color: var(--text-muted); border-color: var(--border-strong); }
.btn.sessiz:hover:not(:disabled) { background: var(--surface-sunken); color: var(--text-strong); }

/* iş listesi */
.yanBaslik { margin-bottom: var(--space-3); }
.is {
  display: block; width: 100%; text-align: left; cursor: pointer;
  background: transparent; border: 1px solid transparent; border-radius: var(--radius-1);
  padding: 9px 10px; margin-bottom: 2px;
  transition: background var(--dur-1) var(--ease-standard);
}
.is:hover { background: var(--surface-sunken); }
.is.secili { background: var(--surface-sunken); border-color: var(--border-hair); border-left: 2px solid var(--accent); }
.is .ad { font-size: var(--fs-sm); color: var(--text-strong); font-weight: var(--fw-medium);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.is .alt { display: flex; align-items: center; gap: 6px; margin-top: 3px;
  font-family: var(--font-mono); font-size: var(--fs-micro); color: var(--text-muted); }

/* aşamalar — dürüst ilerleme */
.asama { display: flex; align-items: center; gap: 10px; padding: 9px 0;
  border-bottom: 1px solid var(--border-hair); font-size: var(--fs-sm); }
.asama:last-child { border-bottom: 0; }
.asama .im { width: 16px; text-align: center; font-family: var(--font-mono);
  font-size: var(--fs-micro); flex: none; }
.asama.bitti { color: var(--text-muted); } .asama.bitti .im { color: var(--sig-verified); }
.asama.aktif { color: var(--text-strong); font-weight: var(--fw-medium); }
.asama.aktif .im { color: var(--accent); animation: tnk-pulse 1.6s var(--ease-standard) infinite; }
.asama.bekleyen { color: var(--text-faint); }

/* defter */
.defterBas {
  display: flex; align-items: center; gap: var(--space-3); width: 100%;
  padding: 11px 14px; cursor: pointer; text-align: left;
  background: transparent; border: 0;
  transition: background var(--dur-1) var(--ease-standard);
}
.defterBas:hover { background: var(--surface-sunken); }
.defterOlcum { flex: 1; min-width: 0; display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: var(--fs-sm); color: var(--text-body); }
.defterOlcum b { color: var(--text-strong); font-weight: var(--fw-medium); }
.defterOlcum .ayrac { color: var(--border-strong); }
.defterAc { flex: none; font-family: var(--font-sans); font-size: var(--fs-sm);
  font-weight: var(--fw-medium); color: var(--accent); }
.defterIc { padding: 2px 14px 14px; border-top: 1px solid var(--border-hair); }
.defterNot { font-size: var(--fs-sm); color: var(--text-muted); margin-top: var(--space-3); }
.defterOlcum .turler b { color: var(--sig-recovered); }
/* Kurtarma bir KAZANÇ — uyarı değil. Sağlama tonu, alarm yok. */
.kurtarmaNot {
  margin-top: var(--space-3); padding: 10px 12px;
  border-left: 3px solid var(--sig-recovered); background: var(--sig-recovered-bg);
  border-radius: var(--radius-1); font-size: var(--fs-sm); color: var(--text-body);
  line-height: 1.5; max-width: 62ch;
}
.kurtarmaNot b { font-family: var(--font-mono); color: var(--sig-recovered); }

/* Sıkışma ölçeri — yüksek oran okr (davet), alarm kırmızısı DEĞİL. */
.sikisma { display: flex; align-items: center; gap: 12px; margin-top: 7px; }
.sikisma .bolum { font-size: var(--fs-sm); color: var(--text-body);
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sikisma .cubuk { width: 130px; height: 6px; flex: none; background: var(--surface-inset);
  border-radius: var(--radius-1); overflow: hidden; }
.sikisma .cubuk > i { display: block; height: 100%; }
.sikisma .oran { font-family: var(--font-mono); font-size: var(--fs-sm);
  font-weight: var(--fw-medium); min-width: 52px; text-align: right; }
.sikisma .kademe { font-family: var(--font-mono); font-size: var(--fs-micro);
  color: var(--text-faint); min-width: 42px; }

/* karantina — nötr olgu, kanıt ekli */
.karantina {
  display: flex; gap: 12px; padding: 12px; margin-top: var(--space-3);
  border: 1px solid var(--border-hair); border-left: 3px solid var(--sig-quarantine);
  border-radius: var(--radius-2); background: var(--surface-card);
}
.karantina .etiket { font-family: var(--font-mono); font-size: var(--fs-micro);
  letter-spacing: var(--track-caps); text-transform: uppercase; color: var(--sig-quarantine); }
/* Kanıt: defter "okuyamadım" derken sayfayı MASAYA KOYAR. Görüntü olmadan
   karantina bir iddia olurdu; kullanıcının bakacak bir şeyi olmalı. */
.karantina .kanit { flex: none; width: 84px; height: 108px; overflow: hidden;
  border: 1px solid var(--border-strong); border-radius: var(--radius-1);
  background: var(--surface-inset); display: block; }
.karantina .kanit img { width: 100%; height: 100%; object-fit: cover; }
.karantina .olcumler { display: flex; gap: 16px; margin-top: 9px;
  font-family: var(--font-mono); font-size: var(--fs-micro); color: var(--text-muted); }
.karantina .olcumler b { color: var(--text-strong); }

/* özet gövdesi — okuma kolonu */
.ozet { margin-top: var(--space-6); }
.ozet h1 { font-size: var(--fs-h1); margin: var(--space-6) 0 var(--space-3); }
.ozet h2 { font-size: var(--fs-h2); margin: var(--space-6) 0 var(--space-3); }
.ozet h3 { font-size: var(--fs-h3); margin: var(--space-5) 0 var(--space-2); }
.ozet p, .ozet li { font-family: var(--font-serif); font-size: 16px; line-height: 1.62;
  color: var(--text-body); max-width: 66ch; }
.ozet p { margin: var(--space-3) 0; }
.ozet ul { margin: var(--space-3) 0; padding-left: 20px; }
.ozet li { margin: 5px 0; }
.ozet code { background: var(--surface-sunken); border: 1px solid var(--border-hair);
  border-radius: var(--radius-1); padding: 1px 5px; }
.ozet hr { border: 0; border-top: 1px solid var(--border-hair); margin: var(--space-6) 0; }
.ozet a { text-decoration: underline; }

/* kurtarılan görsel — ekran kanalından gelen; ENSTRÜMANLI */
/* Kurtarılan görsel bir REFERANS küçük-resmidir, kahraman görüntü değil.
   Yoğun bir video 78 slayt gömebiliyor; tam boy alt alta sayfayı devasa
   uzatıyordu (~39.000px kaydırma). Kompakt tutup tıklayınca büyütüyoruz —
   içerik görünür kalır, okuma metnini boğmaz. */
.kurtarilan { margin: var(--space-4) 0; border: 1px solid var(--border-strong);
  border-radius: var(--radius-2); background: var(--surface-card); overflow: hidden;
  max-width: 440px; }
.kurtarilan .bas { display: flex; align-items: center; gap: 10px; padding: 7px 11px;
  border-bottom: 1px solid var(--border-hair); background: var(--surface-sunken); }
.kurtarilan .tur { font-family: var(--font-mono); font-size: var(--fs-micro);
  letter-spacing: var(--track-caps); color: var(--accent); }
.kurtarilan .zaman { margin-left: auto; font-family: var(--font-mono);
  font-size: var(--fs-micro); color: var(--text-muted); }
.kurtarilan .govdeIm { display: block; width: 100%; border: 0; padding: 0;
  background: var(--surface-card); cursor: zoom-in; }
/* loading="lazy" YOK ve olmayacak: boyutu bilinmeyen görseller 0 yüksekliğe
   çöküp aynı noktaya yığılıyor, tarayıcı da hiçbirini istemiyordu — slaytlar
   sessizce boş kalıyordu. Zaten kurtarılan görsel ürünün tek farkı; onu
   ertelemek yanlış. min-height, yüklenene kadar düzenin zıplamasını önler. */
.kurtarilan img { width: 100%; max-height: 200px; object-fit: contain;
  min-height: 2px; background: var(--surface-inset); }
.kurtarilan.acik .govdeIm { cursor: default; }

/* ipucu / hata */
.ipucu { font-size: var(--fs-sm); color: var(--text-muted); max-width: 62ch; line-height: 1.55; }
.hata { border-left: 3px solid var(--accent); background: var(--accent-tint);
  padding: 12px 14px; border-radius: var(--radius-1); font-family: var(--font-mono);
  font-size: var(--fs-sm); color: var(--text-strong); white-space: pre-wrap; }
.bos { color: var(--text-faint); font-family: var(--font-serif); font-size: 18px; padding: var(--space-7) 0; }
.ilerleme { height: 3px; background: var(--surface-inset); border-radius: 999px;
  overflow: hidden; margin-top: var(--space-3); display: none; }
.ilerleme > div { height: 100%; background: var(--accent); width: 0;
  transition: width var(--dur-2) var(--ease-standard); }
</style>
</head>
<body>

<header class="ust">
  <button class="marka" id="anaSayfa" type="button" aria-label="Ana sayfa">Tanık<b>.</b></button>
  <div class="sag">
    <span class="saglik" id="saglik"></span>
    <button class="btn sessiz" id="tema" type="button" aria-label="Tema değiştir">tema</button>
  </div>
</header>

<div class="govde">
  <aside class="yan">
    <div class="eyebrow yanBaslik">kaynaklar</div>
    <div id="liste"></div>
    <div style="margin-top:var(--space-5)">
      <button class="btn sessiz" id="temizlik" type="button" style="width:100%">öksüz dosyaları tara</button>
      <div class="ipucu" id="bakimSonuc" style="margin-top:6px"></div>
    </div>
  </aside>

  <main class="ana">
    <!-- GİRİŞ -->
    <section class="kolon" id="giris">
      <h1 style="font-size:var(--fs-display);max-width:16ch">Gezilemeyen bir kaynak. Dürüst bir özet.</h1>
      <p class="ipucu" style="margin:var(--space-4) 0 var(--space-6);font-size:var(--fs-body)">
        Video, ses dosyası ya da bağlantı ver. Transkripti, ekrandan okuduğunu ve özeti
        çıkarır — neyi kurtardığını ve neyi okuyamadığını aynı sakinlikte söyleyerek.
      </p>

      <div class="kart">
        <div class="sekmeler" role="tablist">
          <button class="sekme" id="sekLink" role="tab" aria-selected="true" type="button">Bağlantı</button>
          <button class="sekme" id="sekDosya" role="tab" aria-selected="false" type="button">Dosya</button>
        </div>

        <div id="panelLink">
          <div class="satir">
            <input type="text" id="kaynak" placeholder="https://youtube.com/watch?v=…" aria-label="Bağlantı">
            <button class="btn" id="btn" type="button">İşle</button>
          </div>
        </div>

        <div id="panelDosya" style="display:none">
          <label class="dosyaAlan" id="yukleAlan">
            <input type="file" id="dosya" accept="video/*,audio/*,application/pdf,.mp4,.mkv,.webm,.mp3,.m4a,.wav,.pdf" hidden>
            <span id="yukleMetin">Bir video, ses dosyası ya da PDF seç</span>
          </label>
          <div class="satir" style="margin-top:var(--space-3);justify-content:flex-end">
            <button class="btn" id="btnDosya" type="button">İşle</button>
          </div>
        </div>

        <div class="ilerleme" id="ilerleme"><div id="ilerlemeCubuk"></div></div>

        <div style="margin-top:var(--space-5);border-top:1px solid var(--border-hair);padding-top:var(--space-4)">
          <label class="eyebrow" for="saglayici">model</label>
          <select id="saglayici" style="margin-top:6px"></select>
          <div class="ipucu" id="saglayiciNot" style="margin-top:8px"></div>
        </div>
      </div>

      <p class="ipucu" id="ipucu" style="margin-top:var(--space-4)"></p>
    </section>

    <!-- SONUÇ -->
    <section class="kolon" id="icerik" style="display:none">
      <div id="durum"></div>
      <div class="ozet" id="ozet"></div>
    </section>
  </main>
</div>

<script>
// subtitles ve transcribe birbirini DIŞLAYAN yollar (altyazı bulunursa Whisper hiç
// koşmaz). İkisini ayrı satır göstermek "✓ Altyazı kullanılıyor" gibi yanlış bir
// onay üretiyordu; tek adımda birleştirildi. repair de atlanabilir — bu yüzden
// tamamlanmış adımlar sırayla değil, yalnızca AKTİF olan vurgulanarak gösteriliyor.
const ASAMALAR = [
  ["awaiting_download",         "Ev makinesinde indirilmeyi bekliyor"],
  ["fetch",                     "Video indiriliyor"],
  ["pages",                     "Sayfalar okunuyor (metin katmanı / OCR)"],
  ["subtitles|transcribe",      "Transkript hazırlanıyor"],
  ["frames",                    "Slaytlar okunuyor (OCR)"],
  ["repair",                    "Transkript onarılıyor"],
  ["segment",                   "Konulara bölünüyor"],
  ["summarize",                 "Özetleniyor + eleştirmen"],
  ["render",                    "Markdown yazılıyor"],
];
const asamaAdi = (stage) => {
  const bulunan = ASAMALAR.find(([k]) => k.split("|").includes(stage));
  return bulunan ? bulunan[1] : stage;
};

let secili = null, zamanlayici = null, sonListe = null;

const $ = (s) => document.querySelector(s);
const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const mb = (b) => (b / 1048576).toFixed(1) + " MB";
// Saniye -> MM:SS (saat varsa H:MM:SS). Arka uç karantinada ham saniye veriyor.
const fmtTs = (sn) => {
  const t = Math.max(0, Math.round(sn || 0));
  const s = String(t % 60).padStart(2, "0");
  const d = String(Math.floor(t / 60) % 60).padStart(2, "0");
  const h = Math.floor(t / 3600);
  return h ? `${h}:${d}:${s}` : `${d}:${s}`;
};

// ── tema ────────────────────────────────────────────────────────
const temaUygula = (t) => {
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("tanik-tema", t);
};
temaUygula(localStorage.getItem("tanik-tema") || "light");
$("#tema").onclick = () =>
  temaUygula(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");

// ── markdown ────────────────────────────────────────────────────
// Markdown'ı biz ürettiğimiz için biçimi tam biliniyor; harici kütüphane yerine
// yalnızca kullandığımız işaretlemeyi çeviren küçük bir çizici.
function md(src, jobId) {
  const satirIci = (t) =>
    esc(t)
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, a, s) => gorselHtml(a, duzelt(s, jobId)))
      .replace(/\[`([^`]+)`\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener"><code>$1</code></a>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/&lt;sub&gt;/g, "<sub>").replace(/&lt;\/sub&gt;/g, "</sub>");

  const out = [];
  let liste = false;
  const kapat = () => { if (liste) { out.push("</ul>"); liste = false; } };

  for (const ham of src.split("\n")) {
    const s = ham.trim();
    if (!s) { kapat(); continue; }
    if (s === "---") { kapat(); out.push("<hr>"); continue; }
    let m;
    if ((m = s.match(/^(#{1,3})\s+(.*)$/))) {
      kapat();
      out.push(`<h${m[1].length}>${satirIci(m[2])}</h${m[1].length}>`);
    } else if ((m = s.match(/^-\s+(.*)$/))) {
      if (!liste) { out.push("<ul>"); liste = true; }
      out.push(`<li>${satirIci(m[1])}</li>`);
    } else {
      kapat();
      out.push(`<p>${satirIci(s)}</p>`);
    }
  }
  kapat();
  return out.join("\n");
}

// Markdown görselleri göreli yolla (<job>_frames/x.jpg) referans veriyor;
// sunucuda /out altından servis ediliyorlar.
function duzelt(src, jobId) {
  if (/^https?:/.test(src)) return src;
  return "/out/" + src.replace(/^\.\//, "");
}

// Özetteki her görsel EKRAN KANALINDAN kurtarılmış içeriktir: hocanın sesli
// okumadığı bir slayt. Onu düz <img> olarak basmak kurtarma olduğunu görünmez
// kılar — ürünün tek farkı tam da bu. Alt metindeki "MM:SS" damgası varsa
// gösteriliyor; markdown üretimi onu koyduğu sürece tıklanabilir kalır.
function gorselHtml(alt, src) {
  const zaman = (alt.match(/\b(\d{1,2}:\d{2}(?::\d{2})?)\b/) || [])[1] || "";
  return `<figure class="kurtarilan" data-src="${esc(src)}">
    <div class="bas">
      <span class="tur">KURTARILAN GÖRSEL</span>
      ${zaman ? `<span class="zaman">${esc(zaman)}</span>` : ""}
    </div>
    <button class="govdeIm" type="button" aria-label="Görseli aç">
      <img alt="${esc(alt)}" src="${esc(src)}">
    </button>
  </figure>`;
}

// F1 ENSTRÜMANI — tek ölçülen sinyal: kullanıcı kurtarılmış görsele dokunuyor mu?
// Görsel başına YALNIZCA İLK dokunuş sayılır (tık sayısı değil). Sahte teşvik
// yok: "3/5 görüldü" gibi bir dürtme gösterilmez, çünkü ölçümü kirletir.
function enstrumanla(kok) {
  kok.querySelectorAll(".kurtarilan").forEach((f) => {
    f.querySelector(".govdeIm").onclick = () => {
      if (!f.classList.contains("acik")) {
        f.classList.add("acik");
        const n = (+localStorage.getItem("tanik-reveal") || 0) + 1;
        localStorage.setItem("tanik-reveal", n);
        console.log("[tanık] recovered_reveal", n, { job: secili, src: f.dataset.src });
      }
      window.open(f.dataset.src, "_blank", "noopener");
    };
  });
}

// ── sağlayıcılar / sağlık ───────────────────────────────────────
async function saglayicilar() {
  const ps = await (await fetch("/api/providers")).json();
  const sel = $("#saglayici");
  if (!ps.length) {
    sel.innerHTML = `<option>anahtar yok</option>`;
    sel.disabled = true;
    $("#saglayiciNot").textContent = "Hiçbir sağlayıcı anahtarı yok — .env doldurulmalı.";
    $("#btn").disabled = true; $("#btnDosya").disabled = true;
    return;
  }
  sel.innerHTML = ps.map((p) =>
    `<option value="${esc(p.id)}" ${p.varsayilan ? "selected" : ""}>${esc(p.ad)} · ${esc(p.model)}</option>`
  ).join("");
  const not = () => {
    const p = ps.find((x) => x.id === sel.value);
    $("#saglayiciNot").textContent = p ? `+ ${p.artisi} · − ${p.eksisi}` : "";
  };
  sel.onchange = not; not();
}

async function saglik() {
  try {
    const h = await (await fetch("/health")).json();
    const iyi = h.groq_key && h.ocr_ok;
    let t = `<span class="nokta" style="background:${iyi ? "var(--sig-verified)" : "var(--sig-uncertain)"}"></span>` +
            `${esc(h.llm_provider || "")} · ${esc(h.output_language || "")}`;
    if (!h.groq_key) t += " · GROQ_API_KEY yok";
    else if (!h.ocr_ok) t += " · OCR dili eksik";
    $("#saglik").innerHTML = t;
  } catch { $("#saglik").textContent = "sunucuya ulaşılamıyor"; }
}

// ── liste ───────────────────────────────────────────────────────
async function listele() {
  const isler = await (await fetch("/api/jobs")).json();
  const html = isler.map((j) => {
    const renk = j.status === "done" ? "var(--sig-verified)"
      : j.status === "error" ? "var(--accent)" : "var(--sig-uncertain)";
    const etiket = j.status === "done" ? "hazır"
      : j.status === "error" ? "hata" : asamaAdi(j.stage);
    const ad = j.title || j.source.split(/[\\/]/).pop();
    return `<button class="is ${j.id === secili ? "secili" : ""}" data-id="${j.id}" type="button">
      <div class="ad">${esc(ad)}</div>
      <div class="alt"><span class="nokta" style="background:${renk}"></span>${esc(etiket)}${
        j.provider ? ` · ${esc(j.provider)}` : ""}</div>
    </button>`;
  }).join("") || `<div class="ipucu">Henüz kaynak yok.</div>`;

  // Her 5 sn'de DOM'u komple yeniden yazmak odağı kaçırıyor ve tıklamayı
  // bozuyordu; değişmediyse dokunma.
  if (html === sonListe) return;
  sonListe = html;
  $("#liste").innerHTML = html;
  document.querySelectorAll(".is").forEach((el) => el.onclick = () => goster(el.dataset.id));
}

function asamaHtml(job) {
  const i = ASAMALAR.findIndex(([k]) => k.split("|").includes(job.stage));
  return ASAMALAR.map(([, ad], n) => {
    const sinif = n < i ? "bitti" : n === i ? "aktif" : "bekleyen";
    const im = n < i ? "✓" : n === i ? "●" : "○";
    return `<div class="asama ${sinif}"><span class="im">${im}</span>${esc(ad)}</div>`;
  }).join("");
}

// ── defter ──────────────────────────────────────────────────────
// YALNIZCA arka ucun gerçekten ölçtüğü değerler çizilir. Sıkışma oranı ve
// karantina henüz ÜRETİLMİYOR; olmayan ölçümü göstermek ürünün tam olarak
// suçladığı şey olurdu. Arka uç üretmeye başlayınca burada belirirler.
function defterHtml(j) {
  const m = j.meta || {};
  const belge = m.kind === "document";
  const olcum = belge ? [
    // PDF: ölçü birimi sayfa; "kaç okundu, kaçı metin-katmanı, kaçı OCR".
    m.pages ? [`${m.pages}`, "sayfa"] : null,
    m.pages_read != null ? [`${m.pages_read}`, "okundu"] : null,
    m.pages_text_layer ? [`${m.pages_text_layer}`, "metin katmanı"] : null,
    m.pages_ocr ? [`${m.pages_ocr}`, "OCR"] : null,
    m.critic_added ? [`+${m.critic_added}`, "geri eklendi"] : null,
  ].filter(Boolean) : [
    m.duration ? [`${Math.max(1, Math.round(m.duration / 60))}`, "dk"] : null,
    m.sections ? [`${m.sections}`, "bölüm"] : null,
    m.frames_used ? [`${m.frames_used}`, "slayt okundu"] : null,
    m.critic_added ? [`+${m.critic_added}`, "geri eklendi"] : null,
    m.transcript_repaired ? [null, "transkript onarıldı"] : null,
    m.subtitle_lang ? [null, `altyazı: ${m.subtitle_lang}${m.subtitle_auto ? " (otomatik)" : ""}`] : null,
  ].filter(Boolean);

  // "6 madde geri eklendi" anlamsız; tür kullanıcıya NEYİN riskte olduğunu
  // söyler. Sıra arka uçta sabitlendi — her koşuda aynı yerde aynı tür.
  const turler = Object.entries(m.critic_types || {});
  const turSatiri = turler.length
    ? `<span class="turler">${turler.map(([t, n]) =>
        `<b>${n}</b> ${esc(t)}`).join('<span class="ayrac"> · </span>')}</span>`
    : "";

  // Ekran kanalı ürünün TEK farkı: konuşmacının hiç söylemediği, yalnızca
  // slaytta olan bilgi. Kaybı değil, kurtarmayı masaya koyar.
  const ekran = m.critic_from_screen
    ? `<div class="kurtarmaNot"><b>${m.critic_from_screen}</b> madde
       yalnızca ekranda vardı — konuşmacı söylemedi, ses kaydından çıkmazdı.</div>`
    : "";

  // §3 kuplajının karşılığı: ses sustuğunda ekrana daha çok baktık. Bunlar
  // transkriptin kapsamadığı — ve Whisper'ın uydurmaya en yatkın olduğu —
  // pencerelerden gelen ekranlar.
  const sessiz = m.frames_from_silence
    ? `<div class="kurtarmaNot"><b>${m.frames_from_silence}</b> ekran, sesin
       sustuğu anlardan okundu — konuşma durduğunda ekrana daha sık baktım.</div>`
    : "";

  // Sıkışma: defterin ÖLÇEMEDİĞİ boşluk için ölçülebilir vekil. Bir iddia değil,
  // davet — o yüzden dil "kaybolmuş olabilir", ton okr, alarm yok. Ölçülemeyen
  // bölüm (çok kısa) arka uçta listeye hiç girmiyor; burada "?" uydurmuyoruz.
  const sik = m.compression || [];
  const enYuksek = sik.length ? Math.max(...sik.map((x) => x.ratio)) : 0;
  const olcek = Math.max(enYuksek, 20);
  // 1.0 keyfi bir eşik değil, ilkesel sınır: çıktı girdiden uzunsa o bir özet
  // DEĞİLDİR. Gerçek veride görüldü — sessiz videoda Whisper "Thank you."
  // uydurdu, 350 kelimelik özetin tamamı ekrandan geldi ve oran 1'in altına
  // düştü. Eski eşiklerde bu "düşük · yeşil" yani "güvenli" okunuyordu; en çok
  // bakılması gereken yerde defter susuyordu. Genişleme meşru da olabilir
  // (içerik ekrandan gelmiştir) — o yüzden suçlama değil, işaret.
  const kademe = (r) => r < 1 ? ["genişleme", "var(--sig-uncertain)"]
    : r >= 30 ? ["yüksek", "var(--sig-uncertain)"]
    : r >= 12 ? ["orta", "var(--text-muted)"] : ["düşük", "var(--sig-verified)"];
  const sikismaHtml = sik.length ? `
    <div class="eyebrow" style="margin-top:var(--space-5)">sıkışma</div>
    ${sik.map((x) => {
      const [ad, renk] = kademe(x.ratio);
      // Belgede ts sayfa-saniye kodlu ("00:05"); "s. 5" göster.
      const konum = belge ? "s. " + x.ts.split(":").reduce((a, b) => a * 60 + +b, 0) : x.ts;
      return `<div class="sikisma">
        <span class="bolum">${esc(konum)} · ${esc(x.title)}</span>
        <span class="cubuk"><i style="width:${
          // Alt sınır 4%: genişlemede oran ~0 olduğu için çubuk görünmez oluyor
          // ve "burada bir şey yok" diye okunuyordu — etiket "buraya bak" derken.
          Math.max(4, Math.min(100, x.ratio / olcek * 100))
        }%;background:${renk}"></i></span>
        <span class="oran" style="color:${renk}">${x.ratio}:1</span>
        <span class="kademe">${ad}</span>
      </div>`;
    }).join("")}
    ${enYuksek >= 30 ? `<div class="defterNot">En çok sıkışan bölümde bir şey
      kaybolmuş olabilir. Kritikse kaynağa dön — iddia değil, davet.</div>` : ""}
    ${sik.some((x) => x.ratio < 1) ? `<div class="defterNot">Bir bölümde özet,
      giren metinden uzun. İçerik ekrandan gelmiş olabilir — ya da model eklemiş.
      O bölümü kaynakla karşılaştır.</div>` : ""}` : "";

  // Karantina "3 bölge işlenemedi" demez; sayfayı masaya koyar. Nötr arduvaz —
  // okuyamamak bir olgu, alarm değil. Defter kendi ölçümüne de kefil olmaz:
  // kanıt önde, karar kullanıcının.
  const kar = m.quarantined || [];
  // Belgede birim sayfa ("s. 4"), videoda zaman ("14:22"); ikisi de q.ts.
  const konum = (q) => belge ? `s. ${q.page ?? Math.round(q.ts)}` : fmtTs(q.ts);
  const neyi = belge ? "sayfayı" : "ekranı";
  const karantinaHtml = kar.length ? kar.map((q) => `
    <div class="karantina">
      ${q.src ? `<a class="kanit" href="${esc(duzelt(q.src, j.id))}" target="_blank" rel="noopener">
        <img src="${esc(duzelt(q.src, j.id))}" alt="okunamayan ${neyi} ${esc(konum(q))}">
      </a>` : ""}
      <div style="flex:1;min-width:0">
        <div class="etiket">karantina · ${esc(konum(q))}</div>
        <p class="ipucu" style="margin-top:5px">Bu ${neyi} okuyamadım. Metnini
        özete katmadım — işte görüntüsü, sen bak.</p>
        <div class="olcumler">
          <span>güven medyanı <b>${q.conf}</b></span>
          <span>denenen açı <b>4</b></span>
        </div>
      </div>
    </div>`).join("") : "";

  return `<div class="kart vurgu" style="padding:0">
    <button class="defterBas" id="defterBas" type="button" aria-expanded="false">
      <span class="im" style="color:var(--sig-verified);font-family:var(--font-mono)">✓</span>
      <span class="defterOlcum">${olcum.map(([v, l], n) =>
        `${n ? '<span class="ayrac">·</span>' : ""}${v ? `<b>${esc(v)}</b> ` : ""}${esc(l)}`
      ).join("")}${turler.length ? `<span class="ayrac">·</span>${turSatiri}` : ""}</span>
      <span class="defterAc" id="defterAc">aç</span>
    </button>
    <div class="defterIc" id="defterIc" style="display:none">
      ${ekran}
      ${sessiz}
      ${karantinaHtml}
      ${sikismaHtml}
      <div class="defterNot">Defter, ölçtüğü boşlukları bilir; ölçemediğini bilmez.</div>
      <div class="satir" style="margin-top:var(--space-4)">
        <a class="btn sessiz" href="/jobs/${j.id}/markdown" target="_blank" rel="noopener"
           style="text-decoration:none">markdown</a>
        <button class="btn sessiz" id="sil" type="button">sil</button>
      </div>
    </div>
  </div>`;
}

// ── çizim ───────────────────────────────────────────────────────
// Giriş (yeni kaynak) ekranına dön. "Tanık." markası ana-sayfa tuşu.
function anaSayfa() {
  secili = null;
  clearInterval(zamanlayici);
  $("#icerik").style.display = "none";
  $("#giris").style.display = "block";
  sonListe = null;
  listele();  // seçili vurguyu kaldırmak için yeniden çiz
}
$("#anaSayfa").onclick = anaSayfa;

async function goster(id) {
  secili = id;
  clearInterval(zamanlayici);
  $("#giris").style.display = "none";
  $("#icerik").style.display = "block";
  await ciz();
  listele();
  zamanlayici = setInterval(async () => {
    const bitti = await ciz();
    if (bitti) { clearInterval(zamanlayici); listele(); }
  }, 2500);
}

async function ciz() {
  const j = await (await fetch(`/jobs/${secili}`)).json();

  if (j.status === "error") {
    $("#durum").innerHTML = `<h1>Okuyamadım</h1>
      <p class="ipucu" style="margin:var(--space-3) 0">İş yarıda kaldı. Sebebi aşağıda —
      kısaltılmadı, olduğu gibi:</p>
      <div class="hata">${esc(j.error || "bilinmeyen")}</div>`;
    $("#ozet").innerHTML = "";
    return true;
  }

  if (j.status !== "done") {
    let not = "";
    if (j.stage === "awaiting_download") {
      // Bu "takıldı" değil, tasarım: sunucu YouTube'a erişemiyor, ev makinesi
      // indirecek. Söylemezsek kullanıcı bozuk sanır.
      not = `<div class="karantina" style="border-left-color:var(--sig-uncertain)">
        <div>
          <div class="etiket" style="color:var(--sig-uncertain)">bekliyor</div>
          <p class="ipucu" style="margin-top:5px">Sunucu YouTube'a erişemiyor (veri merkezi
          IP'leri engelli). Ev makinendeki <code>agent.ps1</code> bu bağlantıyı indirip
          yükleyecek — çalışmıyorsa başlat. İş kaybolmaz, sırada bekler.</p>
        </div></div>`;
    }
    $("#durum").innerHTML = `<h1>${esc(j.title || "İşleniyor…")}</h1>
      <p class="ipucu" style="margin:var(--space-3) 0 var(--space-5)">
        Kapatmana gerek yok — iş sunucuda devam eder.</p>
      <div class="kart">${asamaHtml(j)}</div>${not}`;
    $("#ozet").innerHTML = "";
    return false;
  }

  $("#durum").innerHTML = defterHtml(j);
  const bas = $("#defterBas"), ic = $("#defterIc");
  bas.onclick = () => {
    const acik = ic.style.display === "block";
    ic.style.display = acik ? "none" : "block";
    bas.setAttribute("aria-expanded", String(!acik));
    $("#defterAc").textContent = acik ? "aç" : "kapat";
  };
  $("#sil").onclick = () => silJob(j.id, j.title || j.id);

  $("#ozet").innerHTML = md(await (await fetch(`/jobs/${secili}/markdown`)).text(), secili);
  enstrumanla($("#ozet"));
  return true;
}

// ── silme / bakım ───────────────────────────────────────────────
async function silJob(id, ad) {
  if (!confirm(`"${ad}" silinsin mi?\n\nÖzet, transkript ve slayt görselleri kalıcı olarak silinir.`)) return;
  const r = await fetch(`/jobs/${id}`, { method: "DELETE" });
  if (!r.ok) { alert("Silinemedi: " + ((await r.json()).detail || r.statusText)); return; }
  const d = await r.json();
  anaSayfa();
  $("#bakimSonuc").textContent = `${d.silinen.length} dosya silindi (${mb(d.bayt)})`;
}

$("#temizlik").onclick = async () => {
  // Önce KURU çalıştır (uygula=false): ne silineceğini görmeden silmiyoruz.
  const on = await (await fetch("/api/cleanup", { method: "POST" })).json();
  if (!on.adet) { $("#bakimSonuc").textContent = "Öksüz dosya yok."; return; }
  if (!confirm(
    `${on.adet} öksüz dosya/klasör bulundu (${mb(on.bayt)}).\n\n` +
    `Bunların veritabanında kaydı yok (silinmiş işlerden kalma).\n\n` +
    on.dosyalar.slice(0, 12).join("\n") + (on.adet > 12 ? "\n…" : "") +
    `\n\nKalıcı olarak silinsin mi?`
  )) return;
  const d = await (await fetch("/api/cleanup?uygula=true", { method: "POST" })).json();
  $("#bakimSonuc").textContent = `${d.adet} öğe silindi (${mb(d.bayt)})`;
};

// ── giriş ───────────────────────────────────────────────────────
const sekmeSec = (link) => {
  $("#sekLink").setAttribute("aria-selected", String(link));
  $("#sekDosya").setAttribute("aria-selected", String(!link));
  $("#panelLink").style.display = link ? "block" : "none";
  $("#panelDosya").style.display = link ? "none" : "block";
};
$("#sekLink").onclick = () => { sekmeSec(true); sifirlaDosya(); };
$("#sekDosya").onclick = () => { sekmeSec(false); $("#kaynak").value = ""; };
sekmeSec(true);

$("#yukleAlan").onclick = () => $("#dosya").click();
$("#dosya").onchange = () => {
  const f = $("#dosya").files[0];
  if (f) {
    $("#kaynak").value = "";
    $("#yukleMetin").textContent = `${f.name} (${mb(f.size)})`;
    $("#yukleAlan").classList.add("dolu");
  }
};

function sifirlaDosya() {
  $("#dosya").value = "";
  $("#yukleMetin").textContent = "Bir video, ses dosyası ya da PDF seç";
  $("#yukleAlan").classList.remove("dolu");
}

// Yükleme XHR ile: fetch yükleme ilerlemesi vermiyor, 500 MB'lık videoda
// göstergesiz beklemek "dondu mu?" hissi veriyor.
function yukle(dosya, provider) {
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append("file", dosya);
    if (provider) fd.append("provider", provider);

    const x = new XMLHttpRequest();
    x.open("POST", "/jobs/upload");
    x.upload.onprogress = (e) => {
      if (!e.lengthComputable) return;
      $("#ilerleme").style.display = "block";
      $("#ilerlemeCubuk").style.width = (e.loaded / e.total * 100) + "%";
      $("#btnDosya").textContent = `Yükleniyor… ${Math.round(e.loaded / e.total * 100)}%`;
    };
    x.onload = () => {
      let d = {};
      try { d = JSON.parse(x.responseText); } catch {}
      x.status < 300 ? resolve(d) : reject(new Error(d.detail || `HTTP ${x.status}`));
    };
    x.onerror = () => reject(new Error("bağlantı koptu"));
    x.send(fd);
  });
}

async function gonder(dosyaMi) {
  const kaynak = $("#kaynak").value.trim();
  const dosya = $("#dosya").files[0];
  if (dosyaMi ? !dosya : !kaynak) return;

  const p = $("#saglayici").value || null;
  $("#btn").disabled = true; $("#btnDosya").disabled = true;
  try {
    let j;
    if (dosyaMi) {
      j = await yukle(dosya, p);
      sifirlaDosya();
    } else {
      const r = await fetch("/jobs", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ source: kaynak, provider: p }),
      });
      if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
      j = await r.json();
      $("#kaynak").value = "";
    }
    goster(j.job_id);
  } catch (e) {
    alert("Gönderilemedi: " + e.message);
  } finally {
    $("#btn").disabled = false; $("#btnDosya").disabled = false;
    $("#btnDosya").textContent = "İşle";
    $("#ilerleme").style.display = "none";
    $("#ilerlemeCubuk").style.width = "0";
  }
}
$("#btn").onclick = () => gonder(false);
$("#btnDosya").onclick = () => gonder(true);
$("#kaynak").onkeydown = (e) => { if (e.key === "Enter") gonder(false); };

$("#ipucu").textContent =
  "Ücretsiz modeller kullanılıyor · kotalar dar, arayüz bunu saklamaz. " +
  "1 saatlik video 10-20 dakika sürebilir.";

saglayicilar();
saglik();
listele();
setInterval(listele, 5000);
</script>
